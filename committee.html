<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Committee - ILFA 10th Batch Union</title>
  <meta name="description" content="Committee members of ILFA - 10th Batch Union, Sheikh Fareed Auliya Da'wa College, Odamala.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Decorative Background Layout -->
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <!-- Floating Header Navigation -->
  <header id="header">
    <div class="header-container">
      <a href="index.html#home" class="logo">
        <img src="files/logo.png" alt="ILFA Logo" class="logo-img" id="logo-img">
      </a>

      <!-- Navigation Links -->
      <nav aria-label="Main Navigation">
        <ul class="nav-menu" id="nav-menu">
          <li><a href="index.html#home" class="nav-link">Home</a></li>
          <li class="nav-item-dropdown">
            <a href="index.html#about" class="nav-link dropdown-toggle nav-link-with-arrow">About <span class="nav-arrow">&#9662;</span></a>
            <ul class="dropdown-menu">
              <li><a href="committee.html" class="dropdown-item active">Committee</a></li>
            </ul>
          </li>
          <li><a href="index.html#news-events" class="nav-link">News&Events</a></li>
          <li><a href="index.html#achievements" class="nav-link">Achievements</a></li>
        </ul>
      </nav>

      <!-- Grid Icon / Menu Indicator -->
      <div class="header-right" id="mobile-toggle" aria-expanded="false" aria-controls="nav-menu">
        <img src="files/5rec.png" alt="Menu" class="grid-icon" id="toggle-icon">
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main>
    <section class="committee-hero">
      <div class="container text-center">
        <span class="about-eyebrow">About</span>
        <h1 class="committee-title">Our Executive Committee</h1>
        <div class="about-divider"></div>
        <p class="committee-subtitle">The dedicated team leading the 10th Batch Union towards positive community action and academic excellence.</p>
      </div>
    </section>

    <section class="committee-section">
      <div class="container committee-grid">
        <!-- Member 1 -->
        <div class="member-card">
          <div class="member-image-wrapper">
            <img src="files/member1.png" alt="Hisam" class="member-img">
          </div>
          <div class="member-info">
            <h3 class="member-name">Hisam</h3>
            <div class="member-meta-row">
              <span class="member-role">President</span>
              <span class="member-place">Palolopparamb</span>
            </div>
          </div>
        </div>

        <!-- Member 2 -->
        <div class="member-card">
          <div class="member-image-wrapper">
            <img src="files/member2.png" alt="Arshad" class="member-img">
          </div>
          <div class="member-info">
            <h3 class="member-name">Arshad</h3>
            <div class="member-meta-row">
              <span class="member-role">Secretary</span>
              <span class="member-place">Kottopadam</span>
            </div>
          </div>
        </div>

        <!-- Member 3 -->
        <div class="member-card">
          <div class="member-image-wrapper">
            <img src="files/member3.png" alt="Afsal" class="member-img">
          </div>
          <div class="member-info">
            <h3 class="member-name">Afsal</h3>
            <div class="member-meta-row">
              <span class="member-role">Treasurer</span>
              <span class="member-place">Arakkuparamb</span>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
